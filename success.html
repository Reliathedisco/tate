<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tate — you're in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0b;
      color: #e4e4e7;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.6s ease-out both;
    }
    .icon { font-size: 2.5rem; margin-bottom: 16px; }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    .dim { color: #71717a; font-size: 0.95rem; line-height: 1.6; }
    .dim strong { color: #e4e4e7; font-weight: 600; }
    .small { font-size: 0.85rem; margin-top: 24px; }
    .key-box, .command-box {
      background: #141416;
      border: 1px solid #1f1f23;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 20px 0;
      cursor: pointer;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }
    .key-box:hover, .command-box:hover { border-color: #2a2a30; }
    .key-box code, .command-box code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #4ade80;
      word-break: break-all;
    }
    .prompt {
      color: #4ade80;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }
    .copy-label {
      font-size: 0.75rem;
      color: #71717a;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .loading { color: #71717a; }
    .loading .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .error-icon { color: #f87171; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading" class="loading">
      <div class="icon"><span class="spinner">⟳</span></div>
      <h1>verifying payment...</h1>
      <p class="dim">hang tight, grabbing your license key</p>
    </div>

    <div id="success" class="hidden">
      <div class="icon">✦</div>
      <h1>you're in</h1>
      <p class="dim" id="email-line">watch mode is unlocked. here's your license key:</p>

      <div class="key-box" onclick="copyKey()">
        <code id="license-key"></code>
        <span class="copy-label" id="copy-label">click to copy</span>
      </div>

      <p class="dim">now run this in your terminal:</p>

      <div class="command-box" onclick="copyCommand()">
        <span class="prompt">$</span>
        <code id="command"></code>
        <span class="copy-label" id="copy-label-cmd">click to copy</span>
      </div>

      <p class="dim small">then start watch mode with <strong>npx tate --watch</strong></p>
    </div>

    <div id="error" class="hidden">
      <div class="icon error-icon">✗</div>
      <h1>something went wrong</h1>
      <p class="dim" id="error-message"></p>
    </div>
  </div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (!sessionId) {
        showError("missing session — try the payment link again");
        return;
      }

      try {
        const res = await fetch(`/api/success?session_id=${sessionId}`);
        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || "couldn't verify payment — contact support");
          return;
        }

        showSuccess(data.licenseKey, data.email);
      } catch {
        showError("something went wrong — contact support");
      }
    }

    function showSuccess(key, email) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
      document.getElementById('license-key').textContent = key;
      document.getElementById('command').textContent = `npx tate --activate ${key}`;
      if (email) {
        document.getElementById('email-line').innerHTML =
          `watch mode is unlocked for <strong>${email}</strong>. here's your license key:`;
      }
    }

    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error-message').textContent = message;
    }

    function copyKey() {
      const key = document.getElementById('license-key').textContent;
      navigator.clipboard.writeText(key);
      const label = document.getElementById('copy-label');
      label.textContent = 'copied!';
      label.style.color = '#4ade80';
      setTimeout(() => { label.textContent = 'click to copy'; label.style.color = ''; }, 2000);
    }

    function copyCommand() {
      const cmd = document.getElementById('command').textContent;
      navigator.clipboard.writeText(cmd);
      const label = document.getElementById('copy-label-cmd');
      label.textContent = 'copied!';
      label.style.color = '#4ade80';
      setTimeout(() => { label.textContent = 'click to copy'; label.style.color = ''; }, 2000);
    }

    init();
  </script>
</body>
</html>
